<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KMTradeLog - Cloud Edition</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

<script type="module">
  // 1. IMPORT FIREBASE TOOLS
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged, updateProfile } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, collection, addDoc, getDocs, query, where, doc, setDoc, getDoc, orderBy, deleteDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  // 2. YOUR SPECIFIC CONFIG
  const firebaseConfig = {
    apiKey: "AIzaSyBxwz8Z8TBHqu6l7viEKsYvUSWUbv5L_-o",
    authDomain: "kmtradelog1.firebaseapp.com",
    projectId: "kmtradelog1",
    storageBucket: "kmtradelog1.firebasestorage.app",
    messagingSenderId: "362957830161",
    appId: "1:362957830161:web:b364d16fe69f3c045499b0",
    measurementId: "G-SRL3NRTY69"
  };

  // 3. INITIALIZE
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  // 4. EXPOSE TOOLS GLOBALLY FOR THE BUTTONS
  window._fbAuth = auth;
  window._fbDb = db;
  window._fs = { collection, addDoc, getDocs, query, where, doc, setDoc, getDoc, orderBy, deleteDoc, serverTimestamp };

  window._fbSignUp = (name, username, email, password) => {
    return createUserWithEmailAndPassword(auth, email, password).then(cred => {
      return updateProfile(cred.user, { displayName: name + '|' + username });
    });
  };
  window._fbSignIn = (email, password) => signInWithEmailAndPassword(auth, email, password);
  window._fbSignOut = () => signOut(auth);
  window._fbOnAuthStateChanged = (cb) => onAuthStateChanged(auth, cb);

  console.log("KMTRADELOG Cloud Initialized ☁️");
</script>

<style>
  /* REUSING YOUR BEAUTIFUL UI STYLES */
  :root {
    --bg-primary: #0a0c10; --bg-secondary: #111318; --bg-card: #161a22;
    --border: #1e2535; --gold: #c9a84c; --gold-light: #f0c05a;
    --text-primary: #e8eaf0; --text-secondary: #7a8499; --green: #00c896; --red: #ff4d6a;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', sans-serif; background: var(--bg-primary); color: var(--text-primary); min-height: 100vh; overflow-x: hidden; }
  .hidden { display: none !important; }
  
  /* AUTH BOX */
  #authOverlay { position: fixed; inset: 0; z-index: 9000; background: var(--bg-primary); display: flex; align-items: center; justify-content: center; padding: 20px; }
  .auth-box { background: var(--bg-card); border: 1px solid var(--border); border-radius: 20px; padding: 40px; width: 100%; max-width: 400px; text-align: center; }
  .auth-box input { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid var(--border); border-radius: 8px; color: white; }
  .auth-btn { width: 100%; padding: 12px; background: var(--gold); border: none; border-radius: 8px; font-weight: bold; cursor: pointer; color: black; }

  /* DASHBOARD UI */
  .sidebar { position: fixed; left: 0; top: 0; bottom: 0; width: 240px; background: var(--bg-secondary); border-right: 1px solid var(--border); }
  .main { margin-left: 240px; padding: 30px; }
  .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 25px; }
  .card { background: var(--bg-card); border: 1px solid var(--border); padding: 20px; border-radius: 12px; }
  table { width: 100%; border-collapse: collapse; margin-top: 20px; }
  th, td { padding: 12px; border-bottom: 1px solid var(--border); text-align: left; }
  .nav-item { padding: 12px 20px; cursor: pointer; color: var(--text-secondary); }
  .nav-item.active { color: var(--gold); background: #1e2330; }
</style>
</head>
<body>

<div id="authOverlay">
  <div class="auth-box">
    <h2 style="color:var(--gold)">KMTradeLog</h2>
    <p style="color:var(--text-secondary); font-size:12px; margin-bottom:20px;">Execute With Precision</p>
    <div id="authForms">
      <input type="email" id="email" placeholder="Email">
      <input type="password" id="pass" placeholder="Password">
      <button class="auth-btn" id="loginBtn" onclick="doLogin()">Sign In</button>
      <p style="margin-top:15px; font-size:12px; color:var(--text-secondary); cursor:pointer;" onclick="doSignUpManual()">No account? <span style="color:var(--gold)">Create one</span></p>
    </div>
  </div>
</div>

<div id="app" class="hidden">
  <nav class="sidebar">
    <div style="padding:20px; border-bottom:1px solid var(--border)"><h3 style="color:var(--gold)">KMTradeLog</h3></div>
    <div class="nav-item active" onclick="navigate('dashboard')">📊 Dashboard</div>
    <div class="nav-item" onclick="navigate('new-trade')">➕ New Trade</div>
    <div class="nav-item" onclick="navigate('trade-list')">📋 Trade List</div>
    <div class="nav-item" style="color:var(--red); margin-top:40px;" onclick="doSignOut()">🚪 Sign Out</div>
  </nav>

  <div class="main">
    <div id="page-dashboard">
      <div class="stat-grid" id="dashStats"></div>
      <div class="card"><canvas id="pnlChart" style="max-height:300px;"></canvas></div>
    </div>

    <div id="page-new-trade" class="hidden">
      <div class="card" style="max-width:500px">
        <h3>Log Trade</h3>
        <input id="f-pair" placeholder="Pair (e.g. XAUUSD)" style="width:100%; padding:10px; margin:10px 0; background:#000; color:white; border:1px solid var(--border);">
        <input id="f-pnl" type="number" placeholder="P&L Result ($)" style="width:100%; padding:10px; margin-bottom:10px; background:#000; color:white; border:1px solid var(--border);">
        <select id="f-outcome" style="width:100%; padding:10px; margin-bottom:10px; background:#000; color:white; border:1px solid var(--border);">
          <option value="win">Win</option><option value="loss">Loss</option>
        </select>
        <button class="auth-btn" onclick="saveTradeToCloud()">Save to Google Cloud ☁️</button>
      </div>
    </div>

    <div id="page-trade-list" class="hidden">
      <div class="card">
        <table>
          <thead><tr><th>Date</th><th>Pair</th><th>P&L</th><th>Outcome</th><th>Action</th></tr></thead>
          <tbody id="tradeTableBody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script>
// ============================================================
// CLOUD LOGIC (Connecting UI to Firebase)
// ============================================================
let trades = [];

function navigate(page) {
  document.getElementById('page-dashboard').classList.add('hidden');
  document.getElementById('page-new-trade').classList.add('hidden');
  document.getElementById('page-trade-list').classList.add('hidden');
  document.getElementById('page-' + page).classList.remove('hidden');
  if(page === 'trade-list') loadTrades();
}

async function doLogin() {
  const e = document.getElementById('email').value;
  const p = document.getElementById('pass').value;
  try { await window._fbSignIn(e, p); } catch(err) { alert(err.message); }
}

async function doSignUpManual() {
  const e = document.getElementById('email').value;
  const p = document.getElementById('pass').value;
  try { 
    await window._fbSignUp("Trader", "User", e, p); 
    alert("Account created! Logging you in...");
  } catch(err) { alert(err.message); }
}

async function doSignOut() { await window._fbSignOut(); location.reload(); }

// BOOTSTRAP AUTH
window.addEventListener('load', () => {
  const check = setInterval(() => {
    if (window._fbOnAuthStateChanged) {
      clearInterval(check);
      window._fbOnAuthStateChanged(user => {
        if (user) {
          document.getElementById('authOverlay').classList.add('hidden');
          document.getElementById('app').classList.remove('hidden');
          loadTrades();
        }
      });
    }
  }, 500);
});

// CLOUD SAVE
async function saveTradeToCloud() {
  const user = window._fbAuth.currentUser;
  const pair = document.getElementById('f-pair').value;
  const pnl = parseFloat(document.getElementById('f-pnl').value);
  const outcome = document.getElementById('f-outcome').value;

  if(!pair || isNaN(pnl)) return alert("Fill all fields");

  try {
    await window._fs.addDoc(window._fs.collection(window._fbDb, "trades"), {
      userId: user.uid,
      pair, pnl, outcome,
      timestamp: window._fs.serverTimestamp()
    });
    alert("Saved to Cloud! ✅");
    navigate('dashboard');
  } catch(e) { alert(e.message); }
}

// CLOUD LOAD
async function loadTrades() {
  const user = window._fbAuth.currentUser;
  const q = window._fs.query(
    window._fs.collection(window._fbDb, "trades"), 
    window._fs.where("userId", "==", user.uid),
    window._fs.orderBy("timestamp", "desc")
  );

  const snap = await window._fs.getDocs(q);
  trades = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
  renderUI();
}

function renderUI() {
  const tbody = document.getElementById('tradeTableBody');
  tbody.innerHTML = trades.map(t => `
    <tr>
      <td>${t.timestamp ? t.timestamp.toDate().toLocaleDateString() : 'Now'}</td>
      <td>${t.pair}</td>
      <td style="color:${t.pnl>=0?'#00c896':'#ff4d6a'}">$${t.pnl}</td>
      <td>${t.outcome.toUpperCase()}</td>
      <td><button onclick="deleteTrade('${t.id}')" style="background:none; border:none; color:red; cursor:pointer">🗑️</button></td>
    </tr>
  `).join('');

  const total = trades.reduce((s,t) => s+t.pnl, 0);
  document.getElementById('dashStats').innerHTML = `
    <div class="card"><h4>Total P&L</h4><h2 style="color:${total>=0?'#00c896':'#ff4d6a'}">$${total.toFixed(2)}</h2></div>
    <div class="card"><h4>Win Rate</h4><h2>${((trades.filter(t=>t.outcome==='win').length / (trades.length || 1))*100).toFixed(1)}%</h2></div>
    <div class="card"><h4>Trade Count</h4><h2>${trades.length}</h2></div>
  `;
}

async function deleteTrade(id) {
  if(!confirm("Delete forever from Cloud?")) return;
  await window._fs.deleteDoc(window._fs.doc(window._fbDb, "trades", id));
  loadTrades();
}
</script>
</body>
</html>
